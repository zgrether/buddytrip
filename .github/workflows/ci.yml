name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# A new commit on the same ref supersedes the in-flight run — cancel it instead of
# letting both compete for (sometimes scarce) hosted runners. Keyed by ref so PR
# branches and main are independent; a canceled run just re-runs on the new SHA.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # --ignore-scripts skips the `supabase` npm package's postinstall, which
      # downloads the CLI binary from GitHub releases and intermittently
      # fails with ECONNRESET in CI. We install the CLI separately via
      # supabase/setup-cli below, so the npm-bundled binary isn't needed.
      - run: npm ci --ignore-scripts
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): `latest` resolves the newest release from a
          # gateway that intermittently times out and blocks the merge-gating job.
          version: 2.78.1
      # Step 0 (ENVIRONMENT_AUDIT.md): the suite runs against an EPHEMERAL LOCAL
      # Supabase started here — NOT the shared prod project. `supabase start` boots
      # the full stack (Docker is preinstalled on ubuntu-latest) and applies every
      # migration in supabase/migrations/. Seed is disabled in config.toml, so the
      # placeholder dev seed.sql never runs. This is what unshares CI from prod: no
      # more churn on the prod IO budget, no cross-branch `db push` deadlock.
      - name: Start local Supabase (applies migrations)
        run: supabase start
      - name: Point the suite at local Supabase
        run: |
          supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' > supabase.env
          set -a; . ./supabase.env; set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
          } >> "$GITHUB_ENV"
          rm -f supabase.env
      - run: npx tsc --noEmit
      - run: npx vitest run

  # Critical-path E2E gate (Issue #29 resolved). Runs the merge-blocking smoke
  # tests (auth-setup → stroke game → scores → scorecard, + match-play) against a
  # fresh LOCAL Supabase — same model as the `test` job. Needs `test` first so unit
  # tests gate before we spend time on the browser run.
  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1
      - name: Start local Supabase (applies migrations)
        run: supabase start
      - name: Point the app + suite at local Supabase
        run: |
          supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' > supabase.env
          set -a; . ./supabase.env; set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
          } >> "$GITHUB_ENV"
          rm -f supabase.env
      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      # Build AFTER the local Supabase env is exported. NEXT_PUBLIC_* are inlined at
      # BUILD time, so the app must be built against the LOCAL Supabase URL/anon key —
      # not prod. (The E2E build-ordering fix: previously the build baked in the remote
      # project via job-level secrets.)
      - name: Build app (served by Playwright's webServer)
        run: npm run build
      - name: Run critical-path E2E
        run: npx playwright test
      - name: Upload report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
