  .ic .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--color-bt-text-dim); }
  svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; width: 18px; height: 18px; }
</style>
