<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Buttons — variants</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 26px; }
  .row { display:flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  button { font: inherit; font-family: var(--font-sans); cursor: pointer; }
  .btn {
    display:inline-flex; align-items:center; gap: 8px;
    padding: 10px 16px; border-radius: 12px;
    font-size: 14px; font-weight: 500; border: none;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .9; }
  .btn-primary { background: var(--color-bt-accent); color: #0d1f1a; }
  .btn-secondary { background: var(--color-bt-card-raised); color: var(--color-bt-text); border: 0.5px solid var(--color-bt-border); }
  .btn-ghost { background: transparent; color: var(--color-bt-text-dim); border: 0.5px solid var(--color-bt-border); }
  .btn-danger { background: var(--color-bt-danger); color: #fff; }
  .btn-dashed { background: transparent; color: var(--color-bt-accent); border: 1.5px dashed var(--color-bt-accent); }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing:.08em; text-transform: uppercase; color: var(--color-bt-text-dim); width: 92px; }
  svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="row">
    <span class="lbl">Primary</span>
    <button class="btn btn-primary"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock dates</button>
    <button class="btn btn-primary">Save</button>
  </div>
  <div class="row">
    <span class="lbl">Secondary</span>
    <button class="btn btn-secondary"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M19 8v6M22 11h-6"/></svg>Manage crew</button>
    <button class="btn btn-secondary">Cancel</button>
  </div>
  <div class="row">
    <span class="lbl">Ghost</span>
    <button class="btn btn-ghost">Dismiss</button>
    <button class="btn btn-ghost">View details</button>
    <span class="lbl">Danger</span>
    <button class="btn btn-danger">Remove</button>
  </div>
  <div class="row">
    <span class="lbl">Dashed/Add</span>
    <button class="btn btn-dashed">+ Add date option</button>
    <button class="btn btn-dashed">+ Add expense</button>
  </div>
</body>
</html>
