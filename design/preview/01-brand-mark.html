<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>BuddyTrip — brand mark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { display:flex; align-items:center; padding: 22px 28px; min-height: 200px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; width:100%; align-items:center; }
  .cell { display:flex; flex-direction:column; align-items:flex-start; gap: 14px; }
  .cell.center { align-items:center; }
  .wordmark { display:inline-flex; align-items:center; gap:9px; font-size:28px; font-weight:600; letter-spacing:0.06em; color: var(--color-bt-text); }
  .wordmark svg { color: var(--color-bt-accent); }
  .swatch-row { display:flex; gap:6px; align-items:center; }
  .chip { background: var(--color-bt-card); padding: 14px; border-radius: 14px; border: 1px solid var(--color-bt-border); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="tag">Mark</div>
      <div class="chip">
        <svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="#2dd4bf"/>
        </svg>
      </div>
    </div>
    <div class="cell">
      <div class="tag">Wordmark · 28/600/0.06em</div>
      <span class="wordmark">
        <svg width="22" height="22" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="currentColor"/>
        </svg>
        BuddyTrip
      </span>
      <span style="font-size:18px;font-weight:600;letter-spacing:.06em;color:var(--color-bt-text);display:inline-flex;align-items:center;gap:7px;">
        <svg width="18" height="18" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="color:var(--color-bt-accent)"><path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="currentColor"/></svg>
        BuddyTrip
      </span>
    </div>
    <div class="cell">
      <div class="tag">Favicon · 16 / 32 / 64</div>
      <div class="swatch-row">
        <svg width="16" height="16" viewBox="0 0 100 100"><path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="#4D7E7D"/></svg>
        <svg width="32" height="32" viewBox="0 0 100 100"><path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="#4D7E7D"/></svg>
        <svg width="64" height="64" viewBox="0 0 100 100"><path d="M 28 8 L 38 8 L 76 26 L 38 44 L 38 75 L 33 92 L 28 75 Z" fill="#4D7E7D"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
