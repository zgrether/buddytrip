<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Role badges + avatars</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 26px; }
  .row { display:flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .role-badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 500; border: 1px solid currentColor;
  }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing:.08em; text-transform: uppercase; color: var(--color-bt-text-dim); width: 64px; }
  .av { display:inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 500; }
  .av.initials { background: var(--color-bt-card-raised); color: var(--color-bt-accent); border: 1.5px solid var(--color-bt-border); }
  svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="row">
    <span class="lbl">Roles</span>
    <span class="role-badge" style="color: var(--color-bt-owner);">Owner</span>
    <span class="role-badge" style="color: var(--color-bt-accent);">Planner</span>
    <span style="font-size:11px;color:var(--color-bt-text-dim);font-style:italic;">Member · (no badge — null)</span>
  </div>
  <div class="row">
    <span class="lbl">Initials</span>
    <span class="av initials" style="width: 30px; height: 30px; font-size: 11px;">ZG</span>
    <span class="av initials" style="width: 36px; height: 36px; font-size: 13px;">BB</span>
    <span class="av initials" style="width: 72px; height: 72px; font-size: 24px;">MK</span>
  </div>
  <div class="row">
    <span class="lbl">Tabler icon</span>
    <span class="av" style="width: 36px; height: 36px; background: var(--color-bt-card-raised); color: var(--color-bt-accent); border: 1.5px solid var(--color-bt-border);">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 21V5a1 1 0 0 1 1-1h12l-3 4 3 4H6"/><path d="M5 21h2"/></svg>
    </span>
    <span class="av" style="width: 36px; height: 36px; background: var(--color-bt-card-raised); color: var(--color-bt-accent); border: 1.5px solid var(--color-bt-border);">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 9h12l-1 7H7L6 9zM10 3h4l1 6h-6l1-6z"/></svg>
    </span>
    <span style="font-size: 11px; color: var(--color-bt-text-dim);">flag / trophy — Tabler stroke 1.75</span>
  </div>
  <div class="row">
    <span class="lbl">Team color</span>
    <span class="av" style="width: 36px; height: 36px; background: #3b82f6; color: #fff; font-size: 13px;">Z</span>
    <span class="av" style="width: 36px; height: 36px; background: #a855f7; color: #fff; font-size: 13px;">B</span>
    <span class="av" style="width: 36px; height: 36px; background: #22c55e; color: #fff; font-size: 13px;">M</span>
    <span class="av" style="width: 36px; height: 36px; background: #f97316; color: #fff; font-size: 13px;">R</span>
  </div>
</body>
</html>
