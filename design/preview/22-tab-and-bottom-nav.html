<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Bottom nav & trip tab bar</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .wrap { padding: 16px 24px; }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing:.08em; text-transform: uppercase; color: var(--color-bt-text-dim); margin-bottom: 6px; }

  /* Trip tab bar */
  .tabs { display: flex; border-bottom: 1px solid var(--color-bt-border); margin-bottom: 18px; }
  .tab { flex: 1; padding: 10px 0; display:flex; flex-direction: column; align-items: center; gap: 4px;
         color: var(--color-bt-text-dim); border-bottom: 2px solid transparent; cursor: pointer; }
  .tab.active { color: var(--color-bt-accent); border-bottom-color: var(--color-bt-accent); }
  .tab-l { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .dot { position: absolute; top: -4px; right: -6px; width: 8px; height: 8px; border-radius: 50%; background: var(--color-bt-accent); }
  .dot.warn { background: var(--color-bt-warning); }
  .iconwrap { position: relative; display: inline-flex; }

  /* Bottom nav (trip) */
  .bnav { background: var(--color-bt-card); border-top: 1px solid var(--color-bt-border); display: flex; }
  .bnav-item { flex: 1; padding: 10px 0; display:flex; flex-direction: column; align-items: center; gap: 4px; color: var(--color-bt-text-dim); cursor: pointer; }
  .bnav-item.active { color: var(--color-bt-accent); }
  .bnav-l { font-size: 10px; font-weight: 500; }

  svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lbl">Trip tab bar · inside /trips/[id]</div>
    <div class="tabs">
      <div class="tab active"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 22V12h6v10"/></svg></span><span class="tab-l">Home</span></div>
      <div class="tab"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg><span class="dot"></span></span><span class="tab-l">Crew</span></div>
      <div class="tab"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M3 12V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v7"/><path d="M2 12h20v6a2 2 0 0 1-2 2h-1l-1 2-1-2h-8l-1 2-1-2H4a2 2 0 0 1-2-2Z"/></svg></span><span class="tab-l">Lodging</span></div>
      <div class="tab"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span><span class="tab-l">Agenda</span></div>
      <div class="tab"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span class="dot warn"></span></span><span class="tab-l">Receipts</span></div>
      <div class="tab"><span class="iconwrap"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 9h12v3a6 6 0 0 1-12 0V9zM10 21h4M12 17v4"/></svg></span><span class="tab-l">Compete</span></div>
    </div>

    <div class="lbl">Bottom nav · in-trip (pinned w/ safe-area)</div>
  </div>
  <div class="bnav">
    <div class="bnav-item active"><svg width="22" height="22" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 22V12h6v10"/></svg><span class="bnav-l">Trip Home</span></div>
    <div class="bnav-item"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span class="bnav-l">Live</span></div>
  </div>
</body>
</html>
