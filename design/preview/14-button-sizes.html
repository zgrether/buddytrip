<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Button sizes & states</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 26px; }
  .row { display:flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .btn { display:inline-flex; align-items: center; gap: 6px; background: var(--color-bt-accent); color: #0d1f1a; border: none; border-radius: 12px; font: 500 14px var(--font-sans); cursor: pointer; }
  .btn.sm { padding: 6px 12px; font-size: 12px; gap: 5px; }
  .btn.md { padding: 10px 16px; }
  .btn.lg { padding: 12px 24px; }
  .lbl { font-size: 10px; font-weight: 600; letter-spacing:.08em; text-transform: uppercase; color: var(--color-bt-text-dim); width: 92px; }
  .disabled { opacity: 0.4; cursor: not-allowed; }
  .pressed { transform: scale(0.98); }
  .icon-btn { width: 36px; height: 36px; border-radius: 9999px; display:inline-flex; align-items: center; justify-content: center; background: transparent; color: var(--color-bt-text-dim); border: none; }
  .icon-btn:hover { background: var(--color-bt-hover); }
  svg { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .spin { animation: bt-spin 1s linear infinite; }
  @keyframes bt-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="row">
    <span class="lbl">Sizes</span>
    <button class="btn sm">Small · 12px</button>
    <button class="btn md">Medium · 14px (default)</button>
    <button class="btn lg">Large · 14px</button>
  </div>
  <div class="row">
    <span class="lbl">States</span>
    <button class="btn md">Default</button>
    <button class="btn md" style="opacity: .9;">Hover</button>
    <button class="btn md pressed">Pressed</button>
    <button class="btn md disabled">Disabled</button>
    <button class="btn md"><svg width="14" height="14" viewBox="0 0 24 24" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Loading</button>
  </div>
  <div class="row">
    <span class="lbl">Icon only</span>
    <button class="icon-btn" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <button class="icon-btn" aria-label="Add"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button class="icon-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg></button>
  </div>
</body>
</html>
